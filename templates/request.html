{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">

                <h3 class="text-center text-danger fw-bold mb-4">
                    🩸 Send Blood Request
                </h3>

                <!-- shows which donor patient is requesting -->
                <div class="alert alert-danger mb-4">
                    <strong>Requesting from:</strong> {{ donor.user.get_full_name }}
                    <br>
                    <strong>Blood Group:</strong> {{ donor.blood_group }}
                    <br>
                    <strong>District:</strong> {{ donor.district }}
                </div>

                <!--form to send request -->
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Your Name</label>
                        <input type="text" name="patient_name" 
                        class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Blood Group Needed</label>
                        <select name="blood_group_needed" class="form-select" required>
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Your District</label>
                        <input type="text" name="district" 
                        class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Your Phone Number</label>
                        <input type="text" name="phone" 
                        class="form-control" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-danger fw-bold">
                            🩸 Send Request
                        </button>
                    </div>
                </form>

                <div class="mt-3 text-center">
                    <a href="/search/" class="text-danger">
                        ← Back to Search
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
