<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donor Finder 🩸</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="/">🩸 Blood Donor Finder</a>
            <div>
                {% if user.is_authenticated %}
                    <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
                    <a href="/logout" class="btn btn-outline-light">Logout</a>
                {% else %}
                    <a href="/login" class="btn btn-outline-light me-2">Login</a>
                    <a href="/register" class="btn btn-light text-danger fw-bold">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
